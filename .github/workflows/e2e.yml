name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    working-directory: blind-test

jobs:
  e2e:
    name: Playwright E2E (with soketi)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      soketi:
        image: quay.io/soketi/soketi:1-16-debian
        ports:
          - 6001:6001
        env:
          SOKETI_DEFAULT_APP_ID: app-id
          SOKETI_DEFAULT_APP_KEY: app-key
          SOKETI_DEFAULT_APP_SECRET: app-secret

    env:
      PUSHER_APP_ID: app-id
      PUSHER_KEY: app-key
      PUSHER_SECRET: app-secret
      PUSHER_CLUSTER: mt1
      PUSHER_HOST: 127.0.0.1
      PUSHER_PORT: "6001"
      PUSHER_USE_TLS: "false"
      NEXT_PUBLIC_PUSHER_KEY: app-key
      NEXT_PUBLIC_PUSHER_CLUSTER: mt1
      NEXT_PUBLIC_PUSHER_HOST: 127.0.0.1
      NEXT_PUBLIC_PUSHER_PORT: "6001"
      NEXT_PUBLIC_PUSHER_USE_TLS: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: blind-test/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests (webServer builds + starts the app)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: blind-test/playwright-report
          retention-days: 7
