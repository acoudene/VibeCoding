name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: blind-test

jobs:
  quality:
    name: Quality (lint + typecheck + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: blind-test/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (with coverage threshold)
        run: pnpm test:unit:coverage

      - name: Integration tests
        run: pnpm test:integration

      - name: Architecture tests
        run: pnpm test:arch
