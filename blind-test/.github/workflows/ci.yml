name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, typecheck, unit, integration, arch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (with coverage)
        run: pnpm test:unit:coverage

      - name: Integration tests
        run: pnpm test:integration

      - name: Architecture tests
        run: pnpm test:arch

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    services:
      soketi:
        image: quay.io/soketi/soketi:1-16-debian
        ports:
          - 6001:6001
        env:
          SOKETI_DEFAULT_APP_ID: app-id
          SOKETI_DEFAULT_APP_KEY: app-key
          SOKETI_DEFAULT_APP_SECRET: app-secret

    env:
      PUSHER_APP_ID: app-id
      PUSHER_KEY: app-key
      PUSHER_SECRET: app-secret
      PUSHER_CLUSTER: mt1
      PUSHER_HOST: 127.0.0.1
      PUSHER_PORT: 6001
      PUSHER_USE_TLS: "false"
      NEXT_PUBLIC_PUSHER_KEY: app-key
      NEXT_PUBLIC_PUSHER_CLUSTER: mt1
      NEXT_PUBLIC_PUSHER_HOST: 127.0.0.1
      NEXT_PUBLIC_PUSHER_PORT: "6001"
      NEXT_PUBLIC_PUSHER_USE_TLS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run Playwright
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
